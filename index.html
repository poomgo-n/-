<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>입고 가이드</title>
  <style>
    :root { --bg:#0b1220; --card:#111a2e; --text:#e9eefc; --muted:#9fb0d0; --line:rgba(255,255,255,.12); }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", sans-serif; background:var(--bg); color:var(--text); }
    header { position:sticky; top:0; background:rgba(11,18,32,.85); backdrop-filter: blur(10px); border-bottom:1px solid var(--line); }
    .wrap { max-width: 1100px; margin:0 auto; padding:16px; }
    .brand { display:flex; align-items:center; gap:12px; }
    .logo { width:36px; height:36px; border-radius:10px; background:linear-gradient(135deg,#4f7cff,#7c5cff); display:grid; place-items:center; font-weight:800; }
    .title { font-size:18px; font-weight:800; }
    .sub { font-size:13px; color:var(--muted); margin-top:2px; }

    .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:16px; margin-top:14px; }
    .row { display:flex; gap:12px; flex-wrap:wrap; }
    .pill { padding:8px 10px; border:1px solid var(--line); border-radius:999px; color:var(--muted); font-size:13px; }
    .btn { cursor:pointer; padding:10px 12px; border-radius:12px; border:1px solid var(--line); background:rgba(255,255,255,.06); color:var(--text); font-weight:700; }
    .btn:hover { background:rgba(255,255,255,.10); }

    table { width:100%; border-collapse:separate; border-spacing:0; overflow:hidden; border-radius:14px; border:1px solid var(--line); }
    thead th { text-align:left; font-size:13px; color:var(--muted); background:rgba(255,255,255,.05); padding:12px; border-bottom:1px solid var(--line); }
    tbody td { padding:12px; border-bottom:1px solid var(--line); vertical-align:top; }
    tbody tr:last-child td { border-bottom:none; }
    .hint { font-size:13px; color:var(--muted); line-height:1.5; }
    .error { color:#ffb4b4; }
    input { padding:10px 12px; border-radius:12px; border:1px solid var(--line); background:rgba(255,255,255,.04); color:var(--text); outline:none; }
    input::placeholder { color:rgba(159,176,208,.75); }
  </style>
</head>

<body>
<header>
  <div class="wrap">
    <div class="brand">
      <div class="logo">G</div>
      <div>
        <div class="title">입고 가이드</div>
        <div class="sub">구글 시트 데이터 기반 · 실시간 업데이트</div>
      </div>
    </div>
  </div>
</header>

<main class="wrap">
  <div class="card">
    <div class="row" style="justify-content:space-between; align-items:center;">
      <div class="row">
        <span class="pill" id="statusPill">데이터 불러오는 중…</span>
        <span class="pill" id="updatedPill">업데이트: -</span>
      </div>
      <button class="btn" id="reloadBtn">새로고침</button>
    </div>

    <div style="margin-top:12px;" class="row">
      <input id="q" placeholder="검색 (예: 바코드, 단수, 아웃박스…)" style="flex:1; min-width:260px;">
      <span class="pill">Tip: 시트에서 내용 수정하면 사이트도 바로 반영됨</span>
    </div>

    <div style="margin-top:12px;" class="hint">
      ※ 이 페이지는 “구글 스크립트 웹앱”이 아니라, 일반 정적 웹사이트로 배포되어 고객사 화면에 티가 안 납니다.
    </div>
  </div>

  <div class="card">
    <div id="msg" class="hint"></div>
    <div style="margin-top:12px; overflow:auto;">
      <table>
        <thead><tr id="thead"></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
  // ✅ 여기에 너의 CSV URL만 바꿔 넣으면 끝
  // 예: https://docs.google.com/spreadsheets/d/<ID>/export?format=csv&gid=<GID>
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQpBeQJu80tBSbiJyMdP9WSwOvbF-2Zk3NqmPKmoeG1hRir8GhULIpfahbdGfpkEYLKBcLt-0d6IFEf/pub?gid=0&single=true&output=csv";

  const $ = (s) => document.querySelector(s);
  const thead = $("#thead");
  const tbody = $("#tbody");
  const msg = $("#msg");
  const statusPill = $("#statusPill");
  const updatedPill = $("#updatedPill");
  const q = $("#q");

  let header = [];
  let rows = [];

  function parseCSV(text) {
    // 간단하지만 실무에서 꽤 잘 버팀(따옴표/콤마 처리 포함)
    const out = [];
    let cur = [], field = "", inQuotes = false;

    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      const n = text[i+1];

      if (c === '"' && inQuotes && n === '"') { field += '"'; i++; continue; }
      if (c === '"') { inQuotes = !inQuotes; continue; }

      if (!inQuotes && (c === ",")) { cur.push(field); field = ""; continue; }
      if (!inQuotes && (c === "\n")) { cur.push(field); out.push(cur); cur = []; field = ""; continue; }
      if (c !== "\r") field += c;
    }
    if (field.length || cur.length) { cur.push(field); out.push(cur); }
    return out;
  }

  function renderTable(filterText = "") {
    const ft = filterText.trim().toLowerCase();

    // header
    thead.innerHTML = "";
    header.forEach(h => {
      const th = document.createElement("th");
      th.textContent = h || "-";
      thead.appendChild(th);
    });

    // body
    tbody.innerHTML = "";
    const filtered = ft
      ? rows.filter(r => r.join(" ").toLowerCase().includes(ft))
      : rows;

    filtered.forEach(r => {
      const tr = document.createElement("tr");
      for (let i = 0; i < header.length; i++) {
        const td = document.createElement("td");
        td.textContent = (r[i] ?? "").trim();
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    });

    msg.textContent = `총 ${rows.length.toLocaleString()}행 · 표시 ${filtered.length.toLocaleString()}행`;
  }

  async function load() {
    try {
      statusPill.textContent = "불러오는 중…";
      statusPill.style.borderColor = "rgba(255,255,255,.12)";
      msg.classList.remove("error");

      const res = await fetch(CSV_URL, { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const text = await res.text();
      const grid = parseCSV(text);

      if (!grid.length) throw new Error("CSV가 비어있습니다.");

      header = grid[0];
      rows = grid.slice(1).filter(r => r.some(x => (x ?? "").trim() !== ""));

      updatedPill.textContent = `업데이트: ${new Date().toLocaleString("ko-KR")}`;
      statusPill.textContent = "연동 정상";
      renderTable(q.value);

    } catch (e) {
      msg.textContent = `데이터 로딩 실패: ${e.message}
- 구글 시트가 '웹에 게시' 상태인지
- CSV_URL이 맞는지
- gid가 올바른지 확인해 주세요.`;
      msg.classList.add("error");
      statusPill.textContent = "연동 오류";
    }
  }

  $("#reloadBtn").addEventListener("click", load);
  q.addEventListener("input", () => renderTable(q.value));
  load();
</script>
</body>
</html>
