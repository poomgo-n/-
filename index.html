<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>입고 가이드</title>
  <style>
    :root{
      --bg:#f5f7fb; --card:#fff; --text:#0f172a; --muted:#64748b; --line:#e6ebf3;
      --primary:#2563eb; --primary-weak:#e8f0ff; --shadow:0 10px 28px rgba(15,23,42,.08);
      --radius:16px;
      --danger-bg:#fff1f2; --danger-line:#fecdd3;
    }
    *{box-sizing:border-box}
    body{margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans KR",Arial,sans-serif; background:var(--bg); color:var(--text);}
    header{
      position:sticky; top:0; z-index:50;
      background:rgba(245,247,251,.88); backdrop-filter:blur(10px);
      border-bottom:1px solid var(--line);
    }
    .wrap{max-width:1280px; margin:0 auto; padding:14px 16px;}
    .topbar{display:flex; align-items:center; justify-content:space-between; gap:12px;}
    .brand{display:flex; align-items:center; gap:10px;}
    .logo{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#60a5fa,#2563eb);display:grid;place-items:center;color:#fff;font-weight:900;overflow:hidden}
    .logo img{width:100%;height:100%;object-fit:contain;background:#fff}
    .title{font-weight:950; letter-spacing:-.3px}
    .badge{border:1px solid var(--line); background:#fff; padding:8px 10px; border-radius:999px; font-size:12px; color:var(--muted); white-space:nowrap;}
    .layout{max-width:1280px; margin:0 auto; padding:18px 16px 28px; display:grid; grid-template-columns:320px 1fr; gap:18px;}
    @media (max-width:980px){ .layout{grid-template-columns:1fr;} }

    .panel{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow);}
    .sidebar{position:sticky; top:74px; align-self:start; padding:14px;}
    @media (max-width:980px){ .sidebar{position:static;} }

    .sidebar h3{margin:6px 6px 10px; font-size:14px; color:var(--muted); font-weight:900;}
    .menu{display:flex; flex-direction:column; gap:8px;}
    .menu-btn{
      width:100%; display:flex; align-items:center; justify-content:space-between; gap:12px;
      padding:12px; border-radius:14px; border:1px solid var(--line); background:#fff;
      cursor:pointer; text-align:left;
    }
    .menu-btn:hover{border-color:#cfe0ff; background:#fbfdff;}
    .menu-btn.active{border-color:#b8d0ff; background:var(--primary-weak);}
    .menu-left{display:flex; align-items:center; gap:10px; min-width:0;}
    .menu-num{width:22px;height:22px;border-radius:7px;background:var(--primary);color:#fff;font-weight:900;font-size:12px;display:grid;place-items:center;flex:0 0 auto;}
    .menu-label{font-weight:900;font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
    .menu-count{min-width:22px;height:22px;padding:0 8px;border-radius:999px;background:#fff;border:1px solid var(--line);color:var(--muted);font-size:12px;display:grid;place-items:center;flex:0 0 auto;}
    .sidebar-note{margin-top:12px;padding:12px;border-radius:14px;background:#f7f9ff;border:1px dashed #d8e4ff;color:var(--muted);font-size:12px;line-height:1.5;}

    main{padding:14px;}
    .page-head{padding:16px; margin-bottom:14px;}
    .page-head h1{margin:0; font-size:20px; font-weight:950; letter-spacing:-.4px;}
    .page-head p{margin:8px 0 0; color:var(--muted); font-size:13px; line-height:1.6;}

    .block{
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
      box-shadow:0 8px 24px rgba(15,23,42,.06);
      padding:16px;
      margin-bottom:14px;
    }
    .block.callout-red{
      background:var(--danger-bg);
      border-color:var(--danger-line);
    }
    .block-title{margin:0 0 10px; font-size:16px; font-weight:950; letter-spacing:-.2px;}
    .body{font-size:13px; color:#334155; line-height:1.75;}
    .body strong{color:#0f172a;}
    .body ul{margin:8px 0 8px 18px;}
    .body li{margin:4px 0;}
    .img-wrap{margin-top:12px;border-radius:14px;overflow:hidden;border:1px solid var(--line);background:#f8fafc;}
    .img-wrap img{width:100%;height:auto;display:block;cursor:zoom-in;}
    .divider{height:1px;background:var(--line); margin:14px 0;}

    table.md{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      border:1px solid var(--line);
      border-radius:14px;
      overflow:hidden;
      margin:10px 0;
      background:#fff;
    }
    table.md th, table.md td{
      padding:10px 12px;
      border-bottom:1px solid var(--line);
      font-size:13px;
      vertical-align:top;
    }
    table.md th{background:rgba(37,99,235,.06); color:#0f172a; text-align:left; font-weight:900;}
    table.md tr:last-child td{border-bottom:none;}

    /* modal */
    .modal{position:fixed; inset:0; background:rgba(15,23,42,.65); display:none; align-items:center; justify-content:center; z-index:999; padding:18px;}
    .modal.open{display:flex;}
    .modal-inner{max-width:1100px;width:100%;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 20px 80px rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.25);}
    .modal-top{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--line);font-size:13px;color:var(--muted);}
    .modal-btn{border:1px solid var(--line);background:#fff;border-radius:12px;padding:8px 10px;cursor:pointer;font-weight:900;color:#0f172a;}
    .modal-body img{width:100%;height:auto;display:block;}
  </style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="logo">
          <img src="assets/logo.png" alt="logo" onerror="this.remove()"/>
        </div>
        <div class="title">입고 가이드</div>
      </div>
      <div class="badge" id="updated">업데이트: -</div>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="panel sidebar">
    <h3>목차</h3>
    <div class="menu" id="menu"></div>
    <div class="sidebar-note">
      ※ 본 가이드는 운영 기준에 따라 변경될 수 있습니다.<br/>
      ※ 내용 수정은 구글시트에서 관리됩니다.
    </div>
  </aside>

  <main id="content">
    <div class="panel page-head">
      <h1>로딩 중…</h1>
      <p>구글 시트 데이터를 불러오고 있어요.</p>
    </div>
  </main>
</div>

<div class="modal" id="modal">
  <div class="modal-inner">
    <div class="modal-top">
      <div>이미지 보기</div>
      <button class="modal-btn" id="closeModal">닫기</button>
    </div>
    <div class="modal-body"><img id="modalImg" alt="preview"></div>
  </div>
</div>

<script>
  // ✅ 너가 게시한 CSV 링크(지금 쓰는 pub?gid=0&single=true&output=csv 형태) 그대로 넣으면 됨
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQpBeQJu80tBSbiJyMdP9WSwOvbF-2Zk3NqmPKmoeG1hRir8GhULIpfahbdGfpkEYLKBcLt-0d6IFEf/pub?gid=0&single=true&output=csv";

  const $ = (s)=>document.querySelector(s);
  const menuEl = $("#menu");
  const contentEl = $("#content");
  const updatedEl = $("#updated");

  // modal
  const modal = $("#modal");
  const modalImg = $("#modalImg");
  $("#closeModal").addEventListener("click", ()=> modal.classList.remove("open"));
  modal.addEventListener("click", (e)=>{ if(e.target===modal) modal.classList.remove("open"); });

  function openModal(src){
    modalImg.src = src;
    modal.classList.add("open");
  }

  // robust CSV parser
  function parseCSV(text){
    const rows=[]; let row=[]; let field=""; let inQ=false;
    for(let i=0;i<text.length;i++){
      const c=text[i], n=text[i+1];
      if(c === '"'){
        if(inQ && n === '"'){ field+='"'; i++; continue; }
        inQ=!inQ; continue;
      }
      if(!inQ && c === ','){ row.push(field); field=""; continue; }
      if(!inQ && (c === '\n' || c === '\r')){
        if(c === '\r' && n === '\n') i++;
        row.push(field); rows.push(row);
        row=[]; field=""; continue;
      }
      field += c;
    }
    if(field.length || row.length){ row.push(field); rows.push(row); }
    if(rows[0] && rows[0][0]) rows[0][0] = rows[0][0].replace(/^\uFEFF/, "");
    return rows;
  }

  function headerIndex(header, name){
    const key = name.toLowerCase();
    return header.findIndex(h => (h||"").trim().toLowerCase() === key);
  }

  // Drive 링크 -> img src로 변환
  function driveToImg(url){
    if(!url) return "";
    url = url.trim();
    // file/d/<id> 형태
    const m = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
    if(m && m[1]){
      const id = m[1];
      // 1) uc export
      return `https://drive.google.com/uc?export=view&id=${id}`;
    }
    // 이미 uc/thumbnail이면 그대로
    return url;
  }

  // body: **굵게**, 줄바꿈, [[table]] 파싱
  function renderBody(raw){
    if(!raw) return "";
    let s = raw;

    // 1) 테이블 블록 처리
    // [[table]] ... [[/table]] 내부를 파이프 테이블로 보고 HTML로 변환
    s = s.replace(/\[\[table\]\]([\s\S]*?)\[\[\/table\]\]/g, (_, tableText) => {
      const lines = tableText
        .split(/\r?\n/)
        .map(l => l.trim())
        .filter(Boolean);

      // "A | B | C" 형태 라인만 추출
      const rows = lines
        .filter(l => l.includes("|"))
        .map(l => l.split("|").map(x => x.trim()));

      if(rows.length < 2) return "";

      const head = rows[0];
      const body = rows.slice(1);

      const ths = head.map(h => `<th>${escapeHtml(h)}</th>`).join("");
      const trs = body.map(r => `<tr>${r.map(c => `<td>${escapeHtml(c)}</td>`).join("")}</tr>`).join("");

      return `<table class="md"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
    });

    // 2) **bold**
    s = s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");

    // 3) 간단한 리스트 지원: "▪️", "•", "-" 로 시작하는 줄은 ul로 묶기
    // 우선 줄 단위로 분해
    const lines = s.split(/\r?\n/);

    let out = "";
    let inList = false;

    for(const line of lines){
      const t = line.trim();

      const isBullet = /^([▪•\-]|[0-9]+[.)])\s*/.test(t);
      if(isBullet){
        if(!inList){ out += "<ul>"; inList = true; }
        out += `<li>${escapeHtml(t).replace(/&lt;strong&gt;/g,"<strong>").replace(/&lt;\/strong&gt;/g,"</strong>")}</li>`;
      } else {
        if(inList){ out += "</ul>"; inList = false; }
        if(t === ""){
          out += "<div style='height:8px'></div>";
        } else {
          // 이미 table HTML이 들어간 줄이 있을 수 있어, table 태그면 그대로 둠
          if(t.includes("<table")) out += t;
          else out += `<div>${escapeHtml(t).replace(/&lt;strong&gt;/g,"<strong>").replace(/&lt;\/strong&gt;/g,"</strong>")}</div>`;
        }
      }
    }
    if(inList) out += "</ul>";

    // table HTML이 escape되어버리는 부분 방지(위에서 table은 그대로 넣었고, 여기서 escapeHtml은 줄 단위에만 적용)
    // 최종적으로 table 태그는 이미 안전하게 생성됨.
    return out;
  }

  function escapeHtml(s){
    return (s ?? "").replace(/[&<>"']/g, (m)=>({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[m]));
  }

  function buildUI(sections){
    // menu
    menuEl.innerHTML = "";
    const keys = Object.keys(sections);

    keys.forEach((key, idx)=>{
      const sec = sections[key];
      const btn = document.createElement("button");
      btn.className = "menu-btn";
      btn.dataset.key = key;
      btn.innerHTML = `
        <div class="menu-left">
          <div class="menu-num">${idx+1}</div>
          <div class="menu-label">${escapeHtml(sec.sectionTitle || key)}</div>
        </div>
        <div class="menu-count">${sec.items.length}</div>
      `;
      btn.addEventListener("click", ()=>{
        setActive(key);
        renderSection(sec);
      });
      menuEl.appendChild(btn);
    });

    // open first
    if(keys.length){
      setActive(keys[0]);
      renderSection(sections[keys[0]]);
    } else {
      contentEl.innerHTML = `
        <div class="panel page-head">
          <h1>데이터가 비어있어요</h1>
          <p>구글 시트에 행이 있는지, 헤더가 맞는지 확인해 주세요.</p>
        </div>`;
    }
  }

  function setActive(key){
    [...menuEl.querySelectorAll(".menu-btn")].forEach(b=>{
      b.classList.toggle("active", b.dataset.key === key);
    });
  }

  function renderSection(sec){
    contentEl.innerHTML = `
      <div class="panel page-head">
        <h1>${escapeHtml(sec.sectionTitle || "")}</h1>
        <p>구글 시트에서 내용을 수정하면 이 페이지에 반영됩니다.</p>
      </div>
    `;

    const sorted = [...sec.items].sort((a,b)=>(a.orderNum - b.orderNum));

    for(const item of sorted){
      const block = document.createElement("div");
      block.className = `block ${item.blockType || ""}`.trim();

      const bodyHtml = renderBody(item.body || "");
      const imgSrc = driveToImg(item.imageUrl);

      block.innerHTML = `
        <div class="block-title">${escapeHtml(item.title || "")}</div>
        <div class="body">${bodyHtml}</div>
        ${imgSrc ? `<div class="img-wrap"><img src="${imgSrc}" alt="image"></div>` : ""}
      `;

      // image zoom
      const img = block.querySelector("img");
      if(img){
        img.addEventListener("error", ()=>{
          // uc가 막히면 thumbnail로 재시도
          const m = (item.imageUrl || "").match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
          if(m && m[1]){
            img.src = `https://drive.google.com/thumbnail?id=${m[1]}&sz=w2000`;
          }
        });
        img.addEventListener("click", ()=> openModal(img.src));
      }

      contentEl.appendChild(block);
    }
  }

  async function init(){
    updatedEl.textContent = `업데이트: ${new Date().toLocaleString("ko-KR")}`;

    const res = await fetch(CSV_URL, { cache:"no-store" });
    if(!res.ok) throw new Error(`CSV 로드 실패 (HTTP ${res.status})`);

    const text = await res.text();
    const grid = parseCSV(text).filter(r => r.some(x => (x ?? "").trim() !== ""));
    if(!grid.length) throw new Error("CSV 데이터가 비어있습니다.");

    const header = grid[0].map(x => (x ?? "").trim());
    const body = grid.slice(1);

    const iSectionKey = headerIndex(header, "sectionKey");
    const iSectionTitle = headerIndex(header, "sectionTitle");
    const iSectionOrder = headerIndex(header, "sectionOrder");
    const iBlockType = headerIndex(header, "blockType");
    const iTitle = headerIndex(header, "title");
    const iBody = headerIndex(header, "body");
    const iImageUrl = headerIndex(header, "imageUrl");
    const iOrder = headerIndex(header, "order");

    // 최소 필드 체크
    if(iSectionKey < 0 || iSectionTitle < 0 || iTitle < 0){
      throw new Error("헤더가 맞지 않습니다. (sectionKey, sectionTitle, title 필수)");
    }

    // 섹션 모으기
    const sections = {};
    for(const r of body){
      const sectionKey = (r[iSectionKey] ?? "").trim();
      if(!sectionKey) continue;

      const sectionTitle = (r[iSectionTitle] ?? "").trim();
      const sectionOrder = iSectionOrder >= 0 ? Number((r[iSectionOrder] ?? "0").toString().trim() || 0) : 0;

      if(!sections[sectionKey]){
        sections[sectionKey] = { sectionKey, sectionTitle, sectionOrder, items: [] };
      }

      const orderNum = iOrder >= 0 ? Number((r[iOrder] ?? "0").toString().trim() || 0) : 0;

      sections[sectionKey].items.push({
        blockType: (iBlockType >= 0 ? (r[iBlockType] ?? "").trim() : ""),
        title: (iTitle >= 0 ? (r[iTitle] ?? "").trim() : ""),
        body: (iBody >= 0 ? (r[iBody] ?? "").trim() : ""),
        imageUrl: (iImageUrl >= 0 ? (r[iImageUrl] ?? "").trim() : ""),
        orderNum
      });
    }

    // 섹션 정렬: sectionOrder 기준
    const ordered = Object.values(sections).sort((a,b)=>a.sectionOrder - b.sectionOrder);
    const orderedMap = {};
    for(const s of ordered) orderedMap[s.sectionKey] = s;

    buildUI(orderedMap);
  }

  init().catch(err=>{
    contentEl.innerHTML = `
      <div class="panel page-head">
        <h1>데이터 로딩 실패</h1>
        <p style="color:#b91c1c; font-weight:800;">${(err && err.message) ? err.message : "Unknown error"}</p>
        <p>✅ 확인할 것</p>
        <p style="margin:0; color:var(--muted); line-height:1.7;">
          1) 구글 시트가 ‘웹에 게시’ 상태인지<br/>
          2) CSV_URL이 pub?output=csv 링크가 맞는지<br/>
          3) 헤더가 sectionKey/sectionTitle/sectionOrder/blockType/title/body/imageUrl/order 인지<br/>
          4) Drive 이미지가 ‘링크가 있는 모든 사용자’로 공개인지
        </p>
      </div>
    `;
  });
</script>
</body>
</html>
