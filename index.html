<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>입고 가이드</title>

  <!-- Pretendard -->
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" />

  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e6ebf3;
      --primary:#2563eb;
      --primary-weak:#e8f0ff;
      --shadow:0 10px 28px rgba(15,23,42,.08);
      --radius:16px;

      --danger-bg:#fff1f2;
      --danger-line:#fecdd3;

      --warn-bg:#fff7ed;
      --warn-line:#fed7aa;

      --ok-bg:#effdf5;
      --ok-line:#bbf7d0;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Pretendard Variable","Pretendard",system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans KR",Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    header{
      position:sticky; top:0; z-index:50;
      background:rgba(245,247,251,.9);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--line);
    }
    .wrap{max-width:1280px; margin:0 auto; padding:14px 16px;}
    .topbar{display:flex; align-items:center; justify-content:space-between; gap:12px;}
    .brand{display:flex; align-items:center; gap:12px; min-width:260px;}
    .brand-logo{height:32px;width:auto;display:block;object-fit:contain;}
    @media (max-width:520px){ .brand-logo{height:28px;} }
    .brand-title{font-weight:950; letter-spacing:-.35px; font-size:18px; line-height:1.1;}

    .badge{
      border:1px solid var(--line);
      background:#fff;
      padding:8px 10px;
      border-radius:999px;
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      display:flex; align-items:center; gap:8px;
    }

    .layout{
      max-width:1280px; margin:0 auto;
      padding:18px 16px 28px;
      display:grid;
      grid-template-columns:320px 1fr;
      gap:18px;
    }
    @media (max-width:980px){ .layout{grid-template-columns:1fr;} }

    .panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    /* Sidebar */
    .sidebar{
      position:sticky; top:76px;
      align-self:start;
      padding:14px;
    }
    @media (max-width:980px){ .sidebar{position:static;} }
    .sidebar h3{
      margin:6px 6px 10px;
      font-size:13px;
      color:var(--muted);
      font-weight:950;
      letter-spacing:-.2px;
    }
    .menu{display:flex; flex-direction:column; gap:8px;}
    .menu-btn{
      width:100%;
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#fff;
      cursor:pointer;
      text-align:left;
      transition:.15s ease;
    }
    .menu-btn:hover{border-color:#cfe0ff; background:#fbfdff;}
    .menu-btn.active{border-color:#b8d0ff; background:var(--primary-weak);}
    .menu-left{display:flex; align-items:center; gap:10px; min-width:0;}
    .menu-label{
      font-weight:950;
      font-size:15px;
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
      letter-spacing:-.2px;
    }
    .menu-count{
      min-width:24px;height:24px;padding:0 9px;border-radius:999px;
      background:#fff;border:1px solid var(--line);
      color:var(--muted);font-size:12px;
      display:grid; place-items:center;
      flex:0 0 auto;
    }

    /* Content */
    main{padding:14px;}

    /* Toolbar */
    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      padding:12px;
      margin-bottom:14px;
      align-items:center;
      justify-content:space-between;
    }
    .toolbar-left{display:flex; gap:10px; flex-wrap:wrap; align-items:center; width:100%;}
    .input{
      display:flex; align-items:center; gap:10px;
      border:1px solid var(--line);
      background:#fff;
      border-radius:14px;
      padding:12px 14px;
      min-width: 280px;
      flex: 1 1 520px;
    }
    .input input{
      border:none; outline:none; width:100%;
      font:inherit; font-size:15px;
      background:transparent;
    }
    .pill{
      border:1px solid var(--line);
      background:#fff;
      padding:10px 12px;
      border-radius:999px;
      font-size:13px;
      color:var(--muted);
      display:flex; align-items:center; gap:8px;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
    }
    .pill.active{
      border-color:#b8d0ff;
      background:var(--primary-weak);
      color:#1e3a8a;
      font-weight:800;
    }
    .btn{
      border:1px solid var(--line);
      background:#fff;
      padding:12px 14px;
      border-radius:14px;
      cursor:pointer;
      font-weight:900;
      font-size:14px;
      color:#0f172a;
      white-space:nowrap;
    }
    .btn:hover{background:#fbfdff; border-color:#cfe0ff;}

    /* Blocks */
    .block{
      border:1px solid var(--line);
      border-radius:18px;
      background:#fff;
      box-shadow:0 10px 26px rgba(15,23,42,.06);
      padding:18px;
      margin-bottom:14px;
    }
    .block.callout-red{background:var(--danger-bg); border-color:var(--danger-line);}
    .block.callout-yellow{background:var(--warn-bg); border-color:var(--warn-line);}
    .block.callout-green{background:var(--ok-bg); border-color:var(--ok-line);}

    .block-title{
      margin:0 0 12px;
      font-size:17px;
      font-weight:950;
      letter-spacing:-.25px;
      line-height:1.35;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .title-chip{
      width:26px; height:26px;
      border-radius:9px;
      background:#111827;
      color:#fff;
      display:grid;
      place-items:center;
      font-weight:950;
      font-size:12px;
      flex:0 0 auto;
    }

    .body{
      font-size:15px;
      color:#334155;
      line-height:1.85;
    }
    .body strong{color:#0f172a;}
    .body ul{margin:10px 0 10px 20px;}
    .body li{margin:6px 0;}

    /* [[pre]] */
    .body pre{
      white-space:pre;
      font-family:"Pretendard Variable","Pretendard",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      font-size:14px;
      line-height:1.75;
      margin:12px 0;
      padding:12px 14px;
      border:1px solid rgba(15,23,42,.10);
      border-radius:14px;
      background:rgba(255,255,255,.8);
      overflow:auto;
    }

    /* Segmented (➊➋➌...) */
    .seg-list{display:flex; flex-direction:column; gap:12px; margin-top:10px;}
    .seg-item{
      background:rgba(255,255,255,.75);
      border:1px solid rgba(15,23,42,.10);
      border-radius:14px;
      padding:12px;
    }
    .callout-red .seg-item{border-color:rgba(254,205,211,.95);}
    .seg-top{display:flex; gap:10px; align-items:flex-start;}
    .seg-badge{
      width:28px;height:28px;border-radius:10px;
      display:grid; place-items:center;
      background:#111827;color:#fff;
      font-weight:950;font-size:12px;
      flex:0 0 auto;
      margin-top:1px;
    }
    .seg-head{font-weight:950; font-size:15px; line-height:1.55;}
    .seg-body{
      margin-top:10px;
      padding-top:10px;
      border-top:1px dashed rgba(15,23,42,.14);
      color:#334155;
      font-size:14.5px;
      line-height:1.8;
    }

    /* Table from [[table]] */
    table.md{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      border:1px solid var(--line);
      border-radius:14px;
      overflow:hidden;
      margin:12px 0;
      background:#fff;
    }
    table.md th, table.md td{
      padding:12px 12px;
      border-bottom:1px solid var(--line);
      font-size:14px;
      vertical-align:top;
    }
    table.md td{
      /* ✅ 셀 안 줄바꿈 표시(실제 개행 있을 때도 살아남게) */
      white-space:pre-line;
    }
    table.md th{
      background:rgba(37,99,235,.06);
      color:#0f172a;
      text-align:left;
      font-weight:950;
    }
    table.md tr:last-child td{border-bottom:none;}

    /* ✅ A안: Process UI */
    .process{
      margin:12px 0 4px;
      border:1px solid rgba(15,23,42,.10);
      border-radius:16px;
      background:rgba(255,255,255,.85);
      padding:14px;
    }
    .process-steps{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }
    .step-pill{
      border:1px solid rgba(37,99,235,.25);
      background:rgba(37,99,235,.06);
      color:#1e3a8a;
      border-radius:999px;
      padding:8px 10px;
      font-size:13px;
      font-weight:900;
      letter-spacing:-.2px;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .step-dot{
      width:8px; height:8px; border-radius:99px;
      background:var(--primary);
      display:inline-block;
    }
    .process-divider{
      height:1px;
      background:rgba(15,23,42,.08);
      margin:12px 0;
    }
    .process-roles{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    @media (max-width:640px){ .process-roles{grid-template-columns:1fr;} }
    .role-card{
      border:1px solid rgba(15,23,42,.10);
      border-radius:14px;
      background:#fff;
      padding:12px;
    }
    .role-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
    }
    .role-title{
      font-weight:950;
      font-size:14px;
      letter-spacing:-.2px;
    }
    .role-badge{
      font-size:12px;
      font-weight:900;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(15,23,42,.10);
      color:var(--muted);
      background:#fff;
      white-space:nowrap;
    }
    .role-body{
      font-size:14px;
      color:#334155;
      line-height:1.75;
      white-space:pre-line;
    }

    /* Example toggle */
    .img-toggle-row{
      margin-top:14px;
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    .img-toggle-btn{
      border:1px solid var(--line);
      background:#fff;
      padding:12px 14px;
      border-radius:14px;
      cursor:pointer;
      font-weight:900;
      font-size:14px;
      color:#0f172a;
    }
    .img-toggle-btn:hover{background:#fbfdff; border-color:#cfe0ff;}
    .img-caption{font-size:13px;color:var(--muted);}

    .img-wrap{
      margin-top:12px;
      border-radius:14px;
      overflow:hidden;
      border:1px solid var(--line);
      background:#f8fafc;
      display:none;
    }
    .img-wrap.open{display:block;}
    .img-wrap img{width:100%;height:auto;display:block;cursor:zoom-in;}

    /* Modal */
    .modal{
      position:fixed; inset:0;
      background:rgba(15,23,42,.65);
      display:none;
      align-items:center; justify-content:center;
      z-index:999;
      padding:18px;
    }
    .modal.open{display:flex;}
    .modal-inner{
      max-width:1100px;width:100%;
      background:#fff;border-radius:18px;overflow:hidden;
      box-shadow:0 20px 80px rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.25);
    }
    .modal-top{
      display:flex; align-items:center; justify-content:space-between;
      padding:10px 12px;
      border-bottom:1px solid var(--line);
      font-size:13px; color:var(--muted);
    }
    .modal-btn{
      border:1px solid var(--line);
      background:#fff;
      border-radius:12px;
      padding:8px 10px;
      cursor:pointer;
      font-weight:950;
      color:#0f172a;
    }
    .modal-body img{width:100%;height:auto;display:block;}

    .empty{padding:18px;color:var(--muted);font-size:14px;line-height:1.7;}
  </style>
</head>

<body>
<header>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <img class="brand-logo" src="assets/logo.png" alt="logo" onerror="this.style.display='none'">
        <div class="brand-title">입고 가이드</div>
      </div>
      <div class="badge" id="updatedBadge">업데이트: -</div>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="panel sidebar">
    <h3>목차</h3>
    <div class="menu" id="menu"></div>
  </aside>

  <main id="content">
    <div class="panel" style="padding:16px;">로딩 중…</div>
  </main>
</div>

<!-- Image modal -->
<div class="modal" id="modal">
  <div class="modal-inner">
    <div class="modal-top">
      <div>이미지 보기</div>
      <button class="modal-btn" id="modalClose">닫기</button>
    </div>
    <div class="modal-body">
      <img id="modalImg" alt="preview">
    </div>
  </div>
</div>

<script>
  const CSV_URL =
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vQpBeQJu80tBSbiJyMdP9WSwOvbF-2Zk3NqmPKmoeG1hRir8GhULIpfahbdGfpkEYLKBcLt-0d6IFEf/pub?gid=0&single=true&output=csv";

  const $ = (s)=>document.querySelector(s);
  const menuEl = $("#menu");
  const contentEl = $("#content");
  const updatedBadge = $("#updatedBadge");

  // Modal
  const modal = $("#modal");
  const modalImg = $("#modalImg");
  $("#modalClose").addEventListener("click", ()=> modal.classList.remove("open"));
  modal.addEventListener("click", (e)=>{ if(e.target===modal) modal.classList.remove("open"); });
  window.addEventListener("keydown", (e)=>{ if(e.key==="Escape") modal.classList.remove("open"); });
  function openModal(src){ modalImg.src = src; modal.classList.add("open"); }

  function parseCSV(text){
    const rows = [];
    let row = [];
    let field = "";
    let inQuotes = false;

    for (let i=0; i<text.length; i++){
      const c = text[i];
      const n = text[i+1];

      if (c === '"'){
        if (inQuotes && n === '"'){ field += '"'; i++; continue; }
        inQuotes = !inQuotes;
        continue;
      }
      if (!inQuotes && c === ','){
        row.push(field); field = ""; continue;
      }
      if (!inQuotes && (c === '\n' || c === '\r')){
        if (c === '\r' && n === '\n') i++;
        row.push(field);
        rows.push(row);
        row = [];
        field = "";
        continue;
      }
      field += c;
    }
    if (field.length || row.length){ row.push(field); rows.push(row); }
    if (rows[0] && rows[0][0]) rows[0][0] = rows[0][0].replace(/^\uFEFF/, "");
    return rows;
  }

  function idx(header, name){
    const k = name.toLowerCase();
    return header.findIndex(h => (h||"").trim().toLowerCase() === k);
  }

  function escapeHtml(s){
    return (s ?? "").replace(/[&<>"']/g, (m)=>({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[m]));
  }

  function driveToImg(url){
    if(!url) return "";
    const u = url.trim();
    const m = u.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
    if (m && m[1]) return `https://drive.google.com/uc?export=view&id=${m[1]}`;
    const m2 = u.match(/[?&]id=([a-zA-Z0-9_-]+)/);
    if (m2 && m2[1]) return `https://drive.google.com/uc?export=view&id=${m2[1]}`;
    return u;
  }
  function driveThumbFallback(original){
    const m = (original||"").match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || (original||"").match(/[?&]id=([a-zA-Z0-9_-]+)/);
    if (m && m[1]) return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w2000`;
    return "";
  }

  // title leading number -> chip
  function splitLeadingNumberTitle(title){
    const t = (title || "").trim();
    const m = t.match(/^(\d{1,3})\s*[.)]?\s*(.*)$/);
    if(!m) return { num:null, text:t };
    const num = m[1];
    const text = (m[2] || "").trim() || t;
    return { num, text };
  }

  // [[pre]]
  function renderPreBlocks(s){
    return s.replace(/\[\[pre\]\]([\s\S]*?)\[\[\/pre\]\]/g, (_,content)=> `<pre>${content}</pre>`);
  }

  // [[table]]
  function renderTableBlocks(s){
    return s.replace(/\[\[table\]\]([\s\S]*?)\[\[\/table\]\]/g, (_, tableText)=>{
      const lines = tableText.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
      const rows = lines.filter(l=>l.includes("|")).map(l=>l.split("|").map(x=>x.trim()));
      if (rows.length < 2) return "";
      const head = rows[0];
      const body = rows.slice(1);

      const ths = head.map(h=>`<th>${escapeHtml(h)}</th>`).join("");

      // ✅ 핵심: 셀 텍스트의 "\n" (백슬래시+n)을 줄바꿈으로 변환
      const trs = body.map(r=>{
        const tds = r.map(c=>{
          let safe = escapeHtml(c);
          // "\\n" -> 실제 개행으로
          safe = safe.replace(/\\n/g, "\n");
          // 실제 개행 -> <br>로 (HTML에서 줄바꿈 되게)
          safe = safe.replace(/\n/g, "<br>");
          return `<td>${safe}</td>`;
        }).join("");
        return `<tr>${tds}</tr>`;
      }).join("");

      return `<table class="md"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
    });
  }

  // ✅ A안: [[process]] parser & renderer
  function parseProcessBlock(content){
    const lines = content.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
    if(!lines.length) return null;

    const first = lines[0];
    // separators: >, →, -, |
    const steps = first
      .replace(/→/g, ">")
      .replace(/-/g, ">")
      .split(">")
      .map(x=>x.trim())
      .filter(Boolean);

    let customer = "";
    let poomgo = "";

    for (let i=1;i<lines.length;i++){
      const line = lines[i];
      const m1 = line.match(/^고객사\s*진행\s*:\s*(.*)$/i);
      const m2 = line.match(/^품고\s*진행\s*:\s*(.*)$/i);
      if (m1) customer = m1[1].trim();
      else if (m2) poomgo = m2[1].trim();
    }

    return { steps, customer, poomgo };
  }

  function renderProcessBlocks(s){
    return s.replace(/\[\[process\]\]([\s\S]*?)\[\[\/process\]\]/g, (_, content)=>{
      const p = parseProcessBlock(content);
      if(!p) return "";

      const stepsHtml = p.steps.map(st=>`
        <span class="step-pill"><span class="step-dot"></span>${escapeHtml(st)}</span>
      `).join("");

      const customerBody = p.customer ? escapeHtml(p.customer).replace(/,\s*/g, "\n") : "—";
      const poomgoBody = p.poomgo ? escapeHtml(p.poomgo).replace(/,\s*/g, "\n") : "—";

      return `
        <div class="process">
          <div class="process-steps">${stepsHtml}</div>
          <div class="process-divider"></div>
          <div class="process-roles">
            <div class="role-card">
              <div class="role-head">
                <div class="role-title">고객사 진행</div>
                <div class="role-badge">SELLER</div>
              </div>
              <div class="role-body">${customerBody}</div>
            </div>
            <div class="role-card">
              <div class="role-head">
                <div class="role-title">품고 진행</div>
                <div class="role-badge">POOMGO</div>
              </div>
              <div class="role-body">${poomgoBody}</div>
            </div>
          </div>
        </div>
      `;
    });
  }

  function renderPlain(s){
    const lines = s.split(/\r?\n/);
    let out = "";
    let inList = false;

    for (const line of lines){
      const t = line.trim();

      // already html blocks
      if (t.includes("<table") || t.includes("<pre") || t.includes('class="process"')){
        if (inList){ out += "</ul>"; inList=false; }
        out += t;
        continue;
      }

      const isBullet = /^([▪•\-]|[0-9]+[.)])\s*/.test(t);

      if (isBullet){
        if (!inList){ out += "<ul>"; inList=true; }
        out += `<li>${t}</li>`;
        continue;
      }

      if (inList){ out += "</ul>"; inList=false; }

      if (t === "") out += `<div style="height:10px"></div>`;
      else out += `<div>${t}</div>`;
    }
    if (inList) out += "</ul>";
    return out;
  }

  // segmented (➊➋➌...)
  function renderSegmented(s){
    const splitRegex = /(?=(➊|➋|➌|➍|➎|➏|➐|➑|➒|➓)\s*)/g;
    const chunks = s.split(splitRegex).map(x => (x ?? "").trim()).filter(Boolean);

    const items = [];
    for(let i=0;i<chunks.length;i++){
      const c = chunks[i];
      if (/^(➊|➋|➌|➍|➎|➏|➐|➑|➒|➓)$/.test(c)){
        const next = chunks[i+1] ?? "";
        items.push(`${c} ${next}`.trim());
        i++;
      } else {
        items.push(c);
      }
    }
    if (items.length < 2) return null;

    const html = items.map((it, idx)=>{
      const lines = it.split(/\r?\n/).map(x=>x.trim()).filter(Boolean);
      const first = lines[0] ?? "";
      const rest = lines.slice(1).join("\n");

      const m = first.match(/^(➊|➋|➌|➍|➎|➏|➐|➑|➒|➓)\s*(.*)$/);
      const badge = m ? m[1] : String(idx+1);
      const head = m ? m[2] : first;

      const restHtml = rest ? renderPlain(rest.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")) : "";
      return `
        <div class="seg-item">
          <div class="seg-top">
            <div class="seg-badge">${escapeHtml(badge)}</div>
            <div class="seg-head">${head}</div>
          </div>
          ${rest ? `<div class="seg-body">${restHtml}</div>` : ``}
        </div>
      `;
    }).join("");

    return `<div class="seg-list">${html}</div>`;
  }

  function renderBody(raw){
    if(!raw) return "";
    let s = escapeHtml(raw);

    // ✅ process first
    s = renderProcessBlocks(s);

    // pre / table
    s = renderPreBlocks(s);
    s = renderTableBlocks(s);

    // bold
    s = s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");

    const seg = renderSegmented(s);
    if (seg) return seg;
    return renderPlain(s);
  }

  let SECTIONS = [];
  let ACTIVE_KEY = null;
  let SEARCH_ALL = false;
  let QUERY = "";

  function normalizeNumber(x){
    const n = Number(String(x ?? "").trim());
    return Number.isFinite(n) ? n : 0;
  }

  function buildMenu(){
    menuEl.innerHTML = "";
    SECTIONS.forEach((sec)=>{
      const btn = document.createElement("button");
      btn.className = "menu-btn";
      btn.dataset.key = sec.sectionKey;

      btn.innerHTML = `
        <div class="menu-left">
          <div class="menu-label">${escapeHtml(sec.sectionTitle)}</div>
        </div>
        <div class="menu-count">${sec.items.length}</div>
      `;

      btn.addEventListener("click", ()=>{
        SEARCH_ALL = false;
        setActive(sec.sectionKey);
        render();
        if (window.innerWidth <= 980) window.scrollTo({top:0, behavior:"smooth"});
      });

      menuEl.appendChild(btn);
    });
  }

  function setActive(key){
    ACTIVE_KEY = key;
    [...menuEl.querySelectorAll(".menu-btn")].forEach(b=>{
      b.classList.toggle("active", b.dataset.key === key);
    });
  }

  function getFilteredItems(){
    const q = QUERY.trim().toLowerCase();
    const sectionKeys = SEARCH_ALL ? SECTIONS.map(s=>s.sectionKey) : [ACTIVE_KEY];
    const pickedSections = SECTIONS.filter(s => sectionKeys.includes(s.sectionKey));

    const matches = [];
    for (const sec of pickedSections){
      for (const it of sec.items){
        const hay = `${sec.sectionTitle} ${it.title} ${it.body}`.toLowerCase();
        if (!q || hay.includes(q)){
          matches.push({ section: sec, item: it });
        }
      }
    }
    return matches;
  }

  function renderToolbar(totalCount){
    return `
      <div class="panel toolbar">
        <div class="toolbar-left">
          <div class="input" title="검색">
            <span style="color:var(--muted); font-weight:950;">🔎</span>
            <input id="searchInput" placeholder="검색 (예: 바코드, 단수, 아웃박스, 실셈…)" value="${escapeHtml(QUERY)}"/>
          </div>
          <div class="pill ${SEARCH_ALL ? "active" : ""}" id="toggleScope">
            ${SEARCH_ALL ? "전체 보기" : "현재 목차만"}
          </div>
          <div class="pill" title="검색 결과 수">결과 ${totalCount}건</div>
          <button class="btn" id="refreshBtn">새로고침</button>
        </div>
      </div>
    `;
  }

  function render(){
    const activeSection = SECTIONS.find(s=>s.sectionKey === ACTIVE_KEY) || SECTIONS[0];
    if (!activeSection){
      contentEl.innerHTML = `<div class="panel" style="padding:16px;">데이터가 비어있어요.</div>`;
      return;
    }

    const matches = getFilteredItems();

    // ✅ 섹션 제목 카드(중복 느낌) 제거
    contentEl.innerHTML = `
      ${renderToolbar(matches.length)}
      <div id="blocks"></div>
    `;

    $("#searchInput").addEventListener("input", (e)=>{
      QUERY = e.target.value;
      render();
    });
    $("#toggleScope").addEventListener("click", ()=>{
      SEARCH_ALL = !SEARCH_ALL;
      render();
    });
    $("#refreshBtn").addEventListener("click", ()=> init());

    const blocksEl = $("#blocks");

    if (matches.length === 0){
      blocksEl.innerHTML = `<div class="panel empty">검색 결과가 없어요.</div>`;
      return;
    }

    const grouped = new Map();
    for (const m of matches){
      const k = m.section.sectionKey;
      if (!grouped.has(k)) grouped.set(k, {section: m.section, items: []});
      grouped.get(k).items.push(m.item);
    }

    let html = "";

    for (const [k, v] of grouped.entries()){
      const sec = v.section;
      const items = v.items;

      if (SEARCH_ALL){
        html += `
          <div class="panel" style="padding:14px 16px; margin-bottom:12px; box-shadow:none;">
            <div style="font-weight:950; font-size:16px;">${escapeHtml(sec.sectionTitle)}</div>
          </div>
        `;
      }

      for (const it of items){
        const blockType = (it.blockType || "").trim();
        const cls = ["block", blockType].filter(Boolean).join(" ");

        const imgSrc = driveToImg(it.imageUrl);
        const bodyHtml = renderBody(it.body || "");

        const sp = splitLeadingNumberTitle(it.title || "");
        const titleHtml = it.title ? `
          <div class="block-title">
            ${sp.num ? `<span class="title-chip">${escapeHtml(sp.num)}</span>` : ``}
            <span>${escapeHtml(sp.text)}</span>
          </div>` : ``;

        html += `
          <div class="${cls}">
            ${titleHtml}
            <div class="body">${bodyHtml}</div>

            ${imgSrc ? `
              <div class="img-toggle-row">
                <button class="img-toggle-btn" type="button"
                  data-toggle="img"
                  data-target="img_${it.__id}">
                  예시 보기
                </button>
                <div class="img-caption">클릭 시 예시 이미지를 펼쳐볼 수 있어요.</div>
              </div>

              <div class="img-wrap" id="img_${it.__id}">
                <img src="${imgSrc}" alt="image" data-original="${escapeHtml(it.imageUrl||"")}">
              </div>
            ` : ``}
          </div>
        `;
      }
    }

    blocksEl.innerHTML = html;

    // image modal + fallback
    blocksEl.querySelectorAll("img[data-original]").forEach(img=>{
      img.addEventListener("click", ()=> openModal(img.src));
      img.addEventListener("error", ()=>{
        const fallback = driveThumbFallback(img.dataset.original);
        if (fallback && img.src !== fallback) img.src = fallback;
      });
    });

    // example toggle
    blocksEl.querySelectorAll('button[data-toggle="img"]').forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const targetId = btn.dataset.target;
        const wrap = document.getElementById(targetId);
        if(!wrap) return;

        const isOpen = wrap.classList.toggle("open");
        btn.textContent = isOpen ? "예시 닫기" : "예시 보기";

        if (isOpen){
          wrap.scrollIntoView({behavior:"smooth", block:"nearest"});
        }
      });
    });
  }

  async function init(){
    updatedBadge.textContent = `업데이트: ${new Date().toLocaleString("ko-KR")}`;

    let text = "";
    try{
      const res = await fetch(CSV_URL, { cache:"no-store" });
      if(!res.ok) throw new Error(`CSV 로드 실패 (HTTP ${res.status})`);
      text = await res.text();
    } catch (e){
      contentEl.innerHTML = `
        <div class="panel" style="padding:16px;">
          <div style="font-weight:950; font-size:16px;">데이터 로딩 실패</div>
          <div style="margin-top:8px; color:#b91c1c; font-weight:900;">${escapeHtml(e.message || "Failed to fetch")}</div>
        </div>
      `;
      return;
    }

    const grid = parseCSV(text).filter(r => r.some(x => (x ?? "").toString().trim() !== ""));
    if(!grid.length){
      contentEl.innerHTML = `<div class="panel" style="padding:16px;">CSV가 비어있어요.</div>`;
      return;
    }

    const header = grid[0].map(x => (x ?? "").toString().trim());
    const body = grid.slice(1);

    const iSectionKey = idx(header, "sectionKey");
    const iSectionTitle = idx(header, "sectionTitle");
    const iSectionOrder = idx(header, "sectionOrder");
    const iBlockType = idx(header, "blockType");
    const iTitle = idx(header, "title");
    const iBody = idx(header, "body");
    const iImageUrl = idx(header, "imageUrl");
    const iOrder = idx(header, "order");

    if (iSectionKey < 0 || iSectionTitle < 0){
      contentEl.innerHTML = `<div class="panel" style="padding:16px;">헤더가 맞지 않아요 (sectionKey, sectionTitle 필요)</div>`;
      return;
    }

    const map = new Map();
    let autoId = 0;

    for (const r of body){
      const sectionKey = (r[iSectionKey] ?? "").toString().trim();
      if(!sectionKey) continue;

      const sectionTitle = (r[iSectionTitle] ?? "").toString().trim() || sectionKey;
      const sectionOrder = (iSectionOrder >= 0) ? normalizeNumber(r[iSectionOrder]) : 0;

      if(!map.has(sectionKey)){
        map.set(sectionKey, { sectionKey, sectionTitle, sectionOrder, items: [] });
      }

      map.get(sectionKey).items.push({
        __id: (++autoId),
        blockType: (iBlockType >= 0 ? (r[iBlockType] ?? "").toString().trim() : ""),
        title: (iTitle >= 0 ? (r[iTitle] ?? "").toString().trim() : ""),
        body: (iBody >= 0 ? (r[iBody] ?? "").toString().trim() : ""),
        imageUrl: (iImageUrl >= 0 ? (r[iImageUrl] ?? "").toString().trim() : ""),
        orderNum: (iOrder >= 0 ? normalizeNumber(r[iOrder]) : 0),
      });
    }

    SECTIONS = [...map.values()]
      .sort((a,b)=>a.sectionOrder - b.sectionOrder)
      .map(sec => ({
        ...sec,
        items: [...sec.items].sort((a,b)=>a.orderNum - b.orderNum)
      }));

    buildMenu();

    if(!ACTIVE_KEY || !SECTIONS.some(s=>s.sectionKey===ACTIVE_KEY)){
      ACTIVE_KEY = SECTIONS[0]?.sectionKey ?? null;
    }
    setActive(ACTIVE_KEY);

    render();
  }

  init();
</script>
</body>
</html>
