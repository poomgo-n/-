<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>입고 가이드</title>

<!-- Pretendard -->
<link rel="stylesheet" as="style" crossorigin
href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" />

<style>

body{
font-family:"Pretendard Variable","Pretendard",sans-serif;
margin:0;
background:#f5f7fb;
color:#111;
}

header{
background:white;
padding:18px 28px;
font-weight:700;
font-size:20px;
border-bottom:1px solid #e5e7eb;
display:flex;
align-items:center;
justify-content:space-between;
}

.container{
display:flex;
max-width:1400px;
margin:auto;
}

.sidebar{
width:260px;
background:white;
padding:20px;
border-right:1px solid #e5e7eb;
min-height:100vh;
}

.sidebar h3{
margin-top:0;
}

.sidebar a{
display:block;
padding:10px;
margin-bottom:6px;
border-radius:8px;
text-decoration:none;
color:#333;
font-size:14px;
}

.sidebar a:hover{
background:#f1f5ff;
color:#2563eb;
}

.content{
flex:1;
padding:40px;
}

.section{
margin-bottom:60px;
}

.section h2{
margin-bottom:20px;
font-size:22px;
}

.block{
background:white;
border-radius:12px;
padding:20px;
margin-bottom:20px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

.callout-red{
background:#fff1f2;
border:1px solid #fecdd3;
}

.block h4{
margin:0 0 12px;
}

.seg-list{
display:flex;
flex-direction:column;
gap:12px;
margin-top:10px;
}

.seg-item{
background:white;
border:1px solid #e2e8f0;
border-radius:10px;
padding:12px;
}

.callout-red .seg-item{
border:1px solid #fecdd3;
}

.seg-top{
display:flex;
gap:10px;
align-items:flex-start;
}

.seg-badge{
width:26px;
height:26px;
border-radius:8px;
background:#111827;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
font-weight:700;
}

.seg-head{
font-weight:700;
}

.seg-body{
margin-top:6px;
padding-top:6px;
border-top:1px dashed #e5e7eb;
color:#555;
font-size:14px;
line-height:1.6;
}

.block img{
width:100%;
margin-top:14px;
border-radius:8px;
}

table{
border-collapse:collapse;
width:100%;
margin-top:10px;
}

th,td{
border:1px solid #e5e7eb;
padding:8px;
font-size:14px;
}

th{
background:#f1f5f9;
}

</style>

</head>

<body>

<header>
입고 가이드
<div id="update"></div>
</header>

<div class="container">

<div class="sidebar" id="menu">
<h3>목차</h3>
</div>

<div class="content" id="content"></div>

</div>

<script>

const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQpBeQJu80tBSbiJyMdP9WSwOvbF-2Zk3NqmPKmoeG1hRir8GhULIpfahbdGfpkEYLKBcLt-0d6IFEf/pub?gid=0&single=true&output=csv"

function parseCSV(str){
const rows=[]
let cur=''
let inside=false
let row=[]

for(let i=0;i<str.length;i++){

const c=str[i]
const next=str[i+1]

if(c=='"'){
if(inside && next=='"'){
cur+='"'
i++
}else{
inside=!inside
}
}else if(c==',' && !inside){
row.push(cur)
cur=''
}else if(c=='\n' && !inside){
row.push(cur)
rows.push(row)
row=[]
cur=''
}else{
cur+=c
}
}

if(cur){
row.push(cur)
rows.push(row)
}

return rows
}

function driveToImg(url){

const m=url.match(/\/d\/(.+?)\//)

if(!m)return url

return "https://drive.google.com/uc?export=view&id="+m[1]

}

async function loadGuide(){

const res=await fetch(CSV_URL)
const text=await res.text()

const rows=parseCSV(text)

const header=rows.shift()

const map={}
header.forEach((h,i)=>map[h]=i)

const data={}

rows.forEach(r=>{

const section=r[map.sectionKey]
const sectionTitle=r[map.sectionTitle]
const title=r[map.title]
const body=r[map.body]
const type=r[map.blockType]
const image=r[map.imageUrl]

if(!data[section]){

data[section]={
title:sectionTitle,
blocks:[]
}

}

data[section].blocks.push({
title,
body,
type,
image
})

})

render(data)

}

function render(data){

const menu=document.getElementById("menu")
const content=document.getElementById("content")

Object.keys(data).forEach(key=>{

const sec=data[key]

const id=key

menu.innerHTML+=`<a href="#${id}">${sec.title}</a>`

let html=`<div class="section" id="${id}">
<h2>${sec.title}</h2>`

sec.blocks.forEach(b=>{

html+=`<div class="block ${b.type}">`

if(b.title) html+=`<h4>${b.title}</h4>`

html+=renderBody(b.body)

if(b.image){

html+=`<img src="${driveToImg(b.image)}">`

}

html+=`</div>`

})

html+=`</div>`

content.innerHTML+=html

})

document.getElementById("update").innerText="업데이트: "+new Date().toLocaleString()

}

function renderBody(text){

const split=text.split(/(?=➊|➋|➌|➍|➎)/)

if(split.length>1){

let html='<div class="seg-list">'

split.forEach((s,i)=>{

const lines=s.trim().split("\n")

const head=lines.shift()

html+=`
<div class="seg-item">
<div class="seg-top">
<div class="seg-badge">${i+1}</div>
<div class="seg-head">${head}</div>
</div>
<div class="seg-body">${lines.join("<br>")}</div>
</div>
`

})

html+='</div>'

return html

}

return `<div>${text.replace(/\n/g,"<br>")}</div>`

}

loadGuide()

</script>

</body>
</html>
