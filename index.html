<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>입고 가이드</title>

  <!-- Pretendard -->
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" />

  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e6ebf3;
      --primary:#2563eb;
      --primary-weak:#e8f0ff;
      --shadow:0 10px 28px rgba(15,23,42,.08);
      --radius:16px;

      --danger-bg:#fff1f2;
      --danger-line:#fecdd3;

      --warn-bg:#fff7ed;
      --warn-line:#fed7aa;

      --ok-bg:#effdf5;
      --ok-line:#bbf7d0;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Pretendard Variable","Pretendard",system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans KR",Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    header{
      position:sticky; top:0; z-index:50;
      background:rgba(245,247,251,.9);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--line);
    }
    .wrap{max-width:1280px; margin:0 auto; padding:14px 16px;}
    .topbar{display:flex; align-items:center; justify-content:space-between; gap:12px;}
    .brand{display:flex; align-items:center; gap:10px; min-width:240px;}
    .logo{
      width:34px;height:34px;border-radius:10px;
      background:linear-gradient(135deg,#60a5fa,#2563eb);
      display:grid; place-items:center;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.7);
      box-shadow:0 8px 20px rgba(37,99,235,.15);
      flex:0 0 auto;
    }
    .logo img{width:100%;height:100%;object-fit:contain;background:#fff}
    .brand-title{font-weight:950; letter-spacing:-.35px; font-size:18px;}
    .badge{
      border:1px solid var(--line);
      background:#fff;
      padding:8px 10px;
      border-radius:999px;
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      display:flex; align-items:center; gap:8px;
    }

    .layout{
      max-width:1280px; margin:0 auto;
      padding:18px 16px 28px;
      display:grid;
      grid-template-columns:320px 1fr;
      gap:18px;
    }
    @media (max-width:980px){ .layout{grid-template-columns:1fr;} }

    .panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    /* Sidebar */
    .sidebar{
      position:sticky; top:76px;
      align-self:start;
      padding:14px;
    }
    @media (max-width:980px){ .sidebar{position:static;} }
    .sidebar h3{
      margin:6px 6px 10px;
      font-size:13px;
      color:var(--muted);
      font-weight:950;
      letter-spacing:-.2px;
    }
    .menu{display:flex; flex-direction:column; gap:8px;}
    .menu-btn{
      width:100%;
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#fff;
      cursor:pointer;
      text-align:left;
      transition:.15s ease;
    }
    .menu-btn:hover{border-color:#cfe0ff; background:#fbfdff;}
    .menu-btn.active{border-color:#b8d0ff; background:var(--primary-weak);}
    .menu-left{display:flex; align-items:center; gap:10px; min-width:0;}
    .menu-num{
      width:22px;height:22px;border-radius:7px;
      background:var(--primary); color:#fff;
      font-weight:950; font-size:12px;
      display:grid; place-items:center;
      flex:0 0 auto;
    }
    .menu-label{
      font-weight:950; font-size:14px;
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
      letter-spacing:-.2px;
    }
    .menu-count{
      min-width:22px;height:22px;padding:0 8px;border-radius:999px;
      background:#fff;border:1px solid var(--line);
      color:var(--muted);font-size:12px;
      display:grid; place-items:center;
      flex:0 0 auto;
    }
    .sidebar-note{
      margin-top:12px;
      padding:12px;
      border-radius:14px;
      background:#f7f9ff;
      border:1px dashed #d8e4ff;
      color:var(--muted);
      font-size:12px;
      line-height:1.55;
    }

    /* Content */
    main{padding:14px;}
    .hero{
      padding:16px;
      margin-bottom:14px;
    }
    .hero h1{
      margin:0;
      font-size:20px;
      font-weight:950;
      letter-spacing:-.45px;
    }
    .hero p{
      margin:8px 0 0;
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
    }

    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      padding:12px;
      margin-bottom:14px;
      align-items:center;
      justify-content:space-between;
    }
    .toolbar-left{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
    .input{
      display:flex; align-items:center; gap:8px;
      border:1px solid var(--line);
      background:#fff;
      border-radius:14px;
      padding:10px 12px;
      min-width: 280px;
      flex: 1 1 320px;
    }
    .input input{
      border:none; outline:none; width:100%;
      font:inherit; font-size:14px;
      background:transparent;
    }
    .pill{
      border:1px solid var(--line);
      background:#fff;
      padding:8px 10px;
      border-radius:999px;
      font-size:12px;
      color:var(--muted);
      display:flex; align-items:center; gap:8px;
      cursor:pointer;
      user-select:none;
    }
    .pill.active{
      border-color:#b8d0ff;
      background:var(--primary-weak);
      color:#1e3a8a;
      font-weight:800;
    }
    .btn{
      border:1px solid var(--line);
      background:#fff;
      padding:10px 12px;
      border-radius:14px;
      cursor:pointer;
      font-weight:900;
      color:#0f172a;
    }
    .btn:hover{background:#fbfdff; border-color:#cfe0ff;}

    .block{
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
      box-shadow:0 8px 24px rgba(15,23,42,.06);
      padding:16px;
      margin-bottom:14px;
    }
    .block.callout-red{background:var(--danger-bg); border-color:var(--danger-line);}
    .block.callout-yellow{background:var(--warn-bg); border-color:var(--warn-line);}
    .block.callout-green{background:var(--ok-bg); border-color:var(--ok-line);}

    .block-title{
      margin:0 0 10px;
      font-size:16px;
      font-weight:950;
      letter-spacing:-.25px;
      line-height:1.35;
    }
    .meta-row{
      display:flex; gap:10px; flex-wrap:wrap;
      margin-bottom:10px;
    }
    .meta{
      font-size:12px;
      color:var(--muted);
      background:rgba(255,255,255,.65);
      border:1px solid rgba(15,23,42,.08);
      padding:6px 10px;
      border-radius:999px;
    }

    .body{
      font-size:13.5px;
      color:#334155;
      line-height:1.75;
    }
    .body strong{color:#0f172a;}
    .body ul{margin:8px 0 8px 18px;}
    .body li{margin:4px 0;}
    .hr{height:1px;background:rgba(15,23,42,.10);margin:12px 0;}

    .img-wrap{
      margin-top:12px;
      border-radius:14px;
      overflow:hidden;
      border:1px solid var(--line);
      background:#f8fafc;
    }
    .img-wrap img{
      width:100%;
      height:auto;
      display:block;
      cursor:zoom-in;
    }

    /* Segmented (➊➋➌...) */
    .seg-list{display:flex; flex-direction:column; gap:10px; margin-top:8px;}
    .seg-item{
      background:rgba(255,255,255,.75);
      border:1px solid rgba(15,23,42,.10);
      border-radius:14px;
      padding:12px;
    }
    .callout-red .seg-item{border-color:rgba(254,205,211,.95);}
    .seg-top{display:flex; gap:10px; align-items:flex-start;}
    .seg-badge{
      width:26px;height:26px;border-radius:9px;
      display:grid; place-items:center;
      background:#111827;color:#fff;
      font-weight:950;font-size:12px;
      flex:0 0 auto;
      margin-top:1px;
    }
    .seg-head{font-weight:950; font-size:13.5px; line-height:1.5;}
    .seg-body{
      margin-top:8px;
      padding-top:8px;
      border-top:1px dashed rgba(15,23,42,.14);
      color:#334155;
      font-size:13px;
      line-height:1.7;
    }

    /* Table from [[table]] */
    table.md{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      border:1px solid var(--line);
      border-radius:14px;
      overflow:hidden;
      margin:10px 0;
      background:#fff;
    }
    table.md th, table.md td{
      padding:10px 12px;
      border-bottom:1px solid var(--line);
      font-size:13px;
      vertical-align:top;
    }
    table.md th{
      background:rgba(37,99,235,.06);
      color:#0f172a;
      text-align:left;
      font-weight:950;
    }
    table.md tr:last-child td{border-bottom:none;}

    /* Modal */
    .modal{
      position:fixed; inset:0;
      background:rgba(15,23,42,.65);
      display:none;
      align-items:center; justify-content:center;
      z-index:999;
      padding:18px;
    }
    .modal.open{display:flex;}
    .modal-inner{
      max-width:1100px;width:100%;
      background:#fff;border-radius:18px;overflow:hidden;
      box-shadow:0 20px 80px rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.25);
    }
    .modal-top{
      display:flex; align-items:center; justify-content:space-between;
      padding:10px 12px;
      border-bottom:1px solid var(--line);
      font-size:13px; color:var(--muted);
    }
    .modal-btn{
      border:1px solid var(--line);
      background:#fff;
      border-radius:12px;
      padding:8px 10px;
      cursor:pointer;
      font-weight:950;
      color:#0f172a;
    }
    .modal-body img{width:100%;height:auto;display:block;}
    .empty{
      padding:18px;
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
    }
  </style>
</head>

<body>
<header>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="logo" title="logo">
          <!-- ✅ 여기: repo에 assets/logo.png 올리면 자동 표시 -->
          <img src="assets/logo.png" alt="logo" onerror="this.remove()">
        </div>
        <div class="brand-title">입고 가이드</div>
      </div>
      <div class="badge" id="updatedBadge">업데이트: -</div>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="panel sidebar">
    <h3>목차</h3>
    <div class="menu" id="menu"></div>
    <div class="sidebar-note">
      ※ 본 가이드는 운영 기준에 따라 변경될 수 있습니다.<br/>
      ※ 내용 수정은 구글 시트에서 관리됩니다.
    </div>
  </aside>

  <main id="content">
    <div class="panel hero">
      <h1>로딩 중…</h1>
      <p>구글 시트 데이터를 불러오고 있어요.</p>
    </div>
  </main>
</div>

<!-- Image modal -->
<div class="modal" id="modal">
  <div class="modal-inner">
    <div class="modal-top">
      <div id="modalLabel">이미지 보기</div>
      <button class="modal-btn" id="modalClose">닫기</button>
    </div>
    <div class="modal-body">
      <img id="modalImg" alt="preview">
    </div>
  </div>
</div>

<script>
  /***********************
   * ✅ 너 CSV URL (이미 세팅)
   ***********************/
  const CSV_URL =
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vQpBeQJu80tBSbiJyMdP9WSwOvbF-2Zk3NqmPKmoeG1hRir8GhULIpfahbdGfpkEYLKBcLt-0d6IFEf/pub?gid=0&single=true&output=csv";

  /***********************
   * DOM helpers
   ***********************/
  const $ = (s)=>document.querySelector(s);
  const menuEl = $("#menu");
  const contentEl = $("#content");
  const updatedBadge = $("#updatedBadge");

  // Modal
  const modal = $("#modal");
  const modalImg = $("#modalImg");
  const modalLabel = $("#modalLabel");
  $("#modalClose").addEventListener("click", ()=> modal.classList.remove("open"));
  modal.addEventListener("click", (e)=>{ if(e.target===modal) modal.classList.remove("open"); });
  window.addEventListener("keydown", (e)=>{ if(e.key==="Escape") modal.classList.remove("open"); });

  function openModal(src){
    modalImg.src = src;
    modalLabel.textContent = "이미지 보기";
    modal.classList.add("open");
  }

  /***********************
   * Robust CSV parser
   ***********************/
  function parseCSV(text){
    const rows = [];
    let row = [];
    let field = "";
    let inQuotes = false;

    for (let i=0; i<text.length; i++){
      const c = text[i];
      const n = text[i+1];

      if (c === '"'){
        if (inQuotes && n === '"'){ field += '"'; i++; continue; }
        inQuotes = !inQuotes;
        continue;
      }
      if (!inQuotes && c === ','){
        row.push(field); field = ""; continue;
      }
      if (!inQuotes && (c === '\n' || c === '\r')){
        if (c === '\r' && n === '\n') i++;
        row.push(field);
        rows.push(row);
        row = [];
        field = "";
        continue;
      }
      field += c;
    }
    if (field.length || row.length){ row.push(field); rows.push(row); }

    // BOM 제거
    if (rows[0] && rows[0][0]) rows[0][0] = rows[0][0].replace(/^\uFEFF/, "");
    return rows;
  }

  function idx(header, name){
    const k = name.toLowerCase();
    return header.findIndex(h => (h||"").trim().toLowerCase() === k);
  }

  /***********************
   * Safe helpers
   ***********************/
  function escapeHtml(s){
    return (s ?? "").replace(/[&<>"']/g, (m)=>({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[m]));
  }

  /***********************
   * Drive link -> img src
   ***********************/
  function driveToImg(url){
    if(!url) return "";
    const u = url.trim();
    // file/d/<id>
    const m = u.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
    if (m && m[1]) return `https://drive.google.com/uc?export=view&id=${m[1]}`;
    // open?id=<id>
    const m2 = u.match(/[?&]id=([a-zA-Z0-9_-]+)/);
    if (m2 && m2[1]) return `https://drive.google.com/uc?export=view&id=${m2[1]}`;
    return u; // 이미 외부 이미지 URL이면 그대로
  }
  function driveThumbFallback(original){
    const m = (original||"").match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || (original||"").match(/[?&]id=([a-zA-Z0-9_-]+)/);
    if (m && m[1]) return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w2000`;
    return "";
  }

  /***********************
   * Body renderer
   * - **bold**
   * - [[table]] ... [[/table]]
   * - bullets
   * - segmented ➊➋➌...
   ***********************/
  function renderTableBlocks(s){
    return s.replace(/\[\[table\]\]([\s\S]*?)\[\[\/table\]\]/g, (_, tableText)=>{
      const lines = tableText
        .split(/\r?\n/)
        .map(l=>l.trim())
        .filter(Boolean);

      const rows = lines
        .filter(l=>l.includes("|"))
        .map(l=>l.split("|").map(x=>x.trim()));

      if (rows.length < 2) return "";

      const head = rows[0];
      const body = rows.slice(1);

      const ths = head.map(h=>`<th>${escapeHtml(h)}</th>`).join("");
      const trs = body.map(r=>`<tr>${r.map(c=>`<td>${escapeHtml(c)}</td>`).join("")}</tr>`).join("");

      return `<table class="md"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
    });
  }

  function renderPlain(s){
    const lines = s.split(/\r?\n/);
    let out = "";
    let inList = false;

    for (const line of lines){
      const t = line.trim();

      // table html line passthrough
      if (t.includes("<table")) {
        if (inList){ out += "</ul>"; inList=false; }
        out += t;
        continue;
      }

      const isBullet = /^([▪•\-]|[0-9]+[.)])\s*/.test(t);

      if (isBullet){
        if (!inList){ out += "<ul>"; inList=true; }
        out += `<li>${t}</li>`;
        continue;
      }

      if (inList){ out += "</ul>"; inList=false; }

      if (t === ""){
        out += `<div style="height:8px"></div>`;
      } else {
        out += `<div>${t}</div>`;
      }
    }
    if (inList) out += "</ul>";
    return out;
  }

  function renderSegmented(s){
    // ➊➋➌... 기준 분리
    const splitRegex = /(?=(➊|➋|➌|➍|➎|➏|➐|➑|➒|➓)\s*)/g;
    const chunks = s
      .split(splitRegex)
      .map(x => (x ?? "").trim())
      .filter(Boolean);

    const items = [];
    for(let i=0;i<chunks.length;i++){
      const c = chunks[i];
      if (/^(➊|➋|➌|➍|➎|➏|➐|➑|➒|➓)$/.test(c)){
        const next = chunks[i+1] ?? "";
        items.push(`${c} ${next}`.trim());
        i++;
      } else {
        items.push(c);
      }
    }

    if (items.length < 2) return null;

    const html = items.map((it, idx)=>{
      const lines = it.split(/\r?\n/).map(x=>x.trim()).filter(Boolean);
      const first = lines[0] ?? "";
      const rest = lines.slice(1).join("\n");

      const m = first.match(/^(➊|➋|➌|➍|➎|➏|➐|➑|➒|➓)\s*(.*)$/);
      const badge = m ? m[1] : String(idx+1);
      const head = m ? m[2] : first;

      const restHtml = rest ? renderPlain(rest.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")) : "";

      return `
        <div class="seg-item">
          <div class="seg-top">
            <div class="seg-badge">${escapeHtml(badge)}</div>
            <div class="seg-head">${head}</div>
          </div>
          ${rest ? `<div class="seg-body">${restHtml}</div>` : ``}
        </div>
      `;
    }).join("");

    return `<div class="seg-list">${html}</div>`;
  }

  function renderBody(raw){
    if(!raw) return "";

    // 1) escape 먼저 하고, 필요한 마크업만 되살리는 방식(안전 + 안정)
    let s = escapeHtml(raw);

    // 2) table blocks (escape된 상태에서 처리하면 table 내부 '|' 등도 안전하게)
    s = renderTableBlocks(s);

    // 3) bold
    s = s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");

    // 4) segmented
    const seg = renderSegmented(s);
    if (seg) return seg;

    // 5) plain (line breaks + bullets)
    return renderPlain(s);
  }

  /***********************
   * Data model + rendering
   ***********************/
  let SECTIONS = []; // {key,title,order,items:[...]}
  let ACTIVE_KEY = null;
  let SEARCH_ALL = true; // 전체 검색 / 섹션 검색
  let QUERY = "";

  function normalizeNumber(x){
    const n = Number(String(x ?? "").trim());
    return Number.isFinite(n) ? n : 0;
  }

  function buildMenu(){
    menuEl.innerHTML = "";
    SECTIONS.forEach((sec, idx)=>{
      const btn = document.createElement("button");
      btn.className = "menu-btn";
      btn.dataset.key = sec.sectionKey;
      btn.innerHTML = `
        <div class="menu-left">
          <div class="menu-num">${idx+1}</div>
          <div class="menu-label">${escapeHtml(sec.sectionTitle)}</div>
        </div>
        <div class="menu-count">${sec.items.length}</div>
      `;
      btn.addEventListener("click", ()=>{
        setActive(sec.sectionKey);
        render();
        // mobile 편의: 클릭 시 위로
        if (window.innerWidth <= 980) window.scrollTo({top:0, behavior:"smooth"});
      });
      menuEl.appendChild(btn);
    });
  }

  function setActive(key){
    ACTIVE_KEY = key;
    [...menuEl.querySelectorAll(".menu-btn")].forEach(b=>{
      b.classList.toggle("active", b.dataset.key === key);
    });
  }

  function getFilteredItems(){
    const q = QUERY.trim().toLowerCase();
    const sectionKeys = SEARCH_ALL ? SECTIONS.map(s=>s.sectionKey) : [ACTIVE_KEY];

    const pickedSections = SECTIONS.filter(s => sectionKeys.includes(s.sectionKey));

    const matches = [];
    for (const sec of pickedSections){
      for (const it of sec.items){
        const hay = `${sec.sectionTitle} ${it.title} ${it.body}`.toLowerCase();
        if (!q || hay.includes(q)){
          matches.push({ section: sec, item: it });
        }
      }
    }
    return matches;
  }

  function renderToolbar(totalCount){
    return `
      <div class="panel toolbar">
        <div class="toolbar-left">
          <div class="input" title="검색">
            <span style="color:var(--muted); font-weight:900;">🔎</span>
            <input id="searchInput" placeholder="검색 (예: 바코드, 단수, 아웃박스, 실셈…)" value="${escapeHtml(QUERY)}"/>
          </div>
          <div class="pill ${SEARCH_ALL ? "active" : ""}" id="toggleScope">
            ${SEARCH_ALL ? "전체 검색" : "현재 섹션만"}
          </div>
          <div class="pill" title="검색 결과 수">
            결과 ${totalCount}건
          </div>
        </div>
        <button class="btn" id="refreshBtn">새로고침</button>
      </div>
    `;
  }

  function render(){
    const activeSection = SECTIONS.find(s=>s.sectionKey === ACTIVE_KEY) || SECTIONS[0];
    if (!activeSection){
      contentEl.innerHTML = `
        <div class="panel hero">
          <h1>데이터가 비어있어요</h1>
          <p>시트에 데이터가 있는지, 웹 게시가 되어있는지 확인해 주세요.</p>
        </div>`;
      return;
    }

    const matches = getFilteredItems();

    // 헤더/툴바
    contentEl.innerHTML = `
      <div class="panel hero">
        <h1>${escapeHtml(activeSection.sectionTitle)}</h1>
        <p>구글 시트에서 내용을 수정하면 이 페이지에 반영됩니다.</p>
      </div>
      ${renderToolbar(matches.length)}
      <div id="blocks"></div>
    `;

    // 이벤트 바인딩
    $("#searchInput").addEventListener("input", (e)=>{
      QUERY = e.target.value;
      render();
    });
    $("#toggleScope").addEventListener("click", ()=>{
      SEARCH_ALL = !SEARCH_ALL;
      render();
    });
    $("#refreshBtn").addEventListener("click", ()=> init());

    const blocksEl = $("#blocks");

    if (matches.length === 0){
      blocksEl.innerHTML = `<div class="panel empty">검색 결과가 없어요. (검색 범위를 바꾸거나 키워드를 줄여보세요)</div>`;
      return;
    }

    // 검색 결과가 전체면 섹션별로 묶어서 보여줌
    const grouped = new Map(); // sectionKey -> {section, items[]}
    for (const m of matches){
      const k = m.section.sectionKey;
      if (!grouped.has(k)) grouped.set(k, {section: m.section, items: []});
      grouped.get(k).items.push(m.item);
    }

    let html = "";
    for (const [k, v] of grouped.entries()){
      const sec = v.section;
      const items = v.items;

      // 전체 검색일 때 섹션 헤더를 같이 보여주기
      if (SEARCH_ALL){
        html += `
          <div class="panel hero" style="box-shadow:none; margin-bottom:14px; border-radius:14px;">
            <h1 style="font-size:16px; margin:0;">${escapeHtml(sec.sectionTitle)}</h1>
            <p style="margin:6px 0 0;">결과 ${items.length}건</p>
          </div>
        `;
      }

      for (const it of items){
        const blockType = (it.blockType || "").trim();
        const cls = ["block", blockType].filter(Boolean).join(" ");

        const imgSrc = driveToImg(it.imageUrl);
        const bodyHtml = renderBody(it.body || "");

        html += `
          <div class="${cls}">
            <div class="meta-row">
              ${blockType ? `<div class="meta">${escapeHtml(blockType)}</div>` : ``}
              ${it.orderNum ? `<div class="meta">순서 ${it.orderNum}</div>` : ``}
            </div>
            ${it.title ? `<div class="block-title">${escapeHtml(it.title)}</div>` : ``}
            <div class="body">${bodyHtml}</div>
            ${imgSrc ? `
              <div class="img-wrap">
                <img src="${imgSrc}" alt="image" data-original="${escapeHtml(it.imageUrl||"")}">
              </div>` : ``}
          </div>
        `;
      }
    }

    blocksEl.innerHTML = html;

    // 이미지 클릭 확대 + 에러 fallback
    blocksEl.querySelectorAll("img[data-original]").forEach(img=>{
      img.addEventListener("click", ()=> openModal(img.src));
      img.addEventListener("error", ()=>{
        const fallback = driveThumbFallback(img.dataset.original);
        if (fallback && img.src !== fallback) img.src = fallback;
      });
    });
  }

  /***********************
   * Init (load + parse + build)
   ***********************/
  async function init(){
    updatedBadge.textContent = `업데이트: ${new Date().toLocaleString("ko-KR")}`;

    let text = "";
    try{
      const res = await fetch(CSV_URL, { cache:"no-store" });
      if(!res.ok) throw new Error(`CSV 로드 실패 (HTTP ${res.status})`);
      text = await res.text();
    } catch (e){
      contentEl.innerHTML = `
        <div class="panel hero">
          <h1>데이터 로딩 실패</h1>
          <p style="color:#b91c1c; font-weight:900;">${escapeHtml(e.message || "Failed to fetch")}</p>
          <p>✅ 체크</p>
          <p style="margin:0; color:var(--muted); line-height:1.7;">
            1) 구글 시트가 ‘웹에 게시’ 상태인지<br/>
            2) 링크가 pub?output=csv 형태가 맞는지<br/>
            3) GitHub Pages(https://...)로 접속 중인지 (로컬 file://는 막힐 수 있음)
          </p>
        </div>
      `;
      return;
    }

    const grid = parseCSV(text).filter(r => r.some(x => (x ?? "").toString().trim() !== ""));
    if(!grid.length){
      contentEl.innerHTML = `<div class="panel hero"><h1>CSV가 비어있어요</h1><p>시트에 데이터가 있는지 확인해 주세요.</p></div>`;
      return;
    }

    const header = grid[0].map(x => (x ?? "").toString().trim());
    const body = grid.slice(1);

    const iSectionKey = idx(header, "sectionKey");
    const iSectionTitle = idx(header, "sectionTitle");
    const iSectionOrder = idx(header, "sectionOrder");
    const iBlockType = idx(header, "blockType");
    const iTitle = idx(header, "title");
    const iBody = idx(header, "body");
    const iImageUrl = idx(header, "imageUrl");
    const iOrder = idx(header, "order");

    if (iSectionKey < 0 || iSectionTitle < 0){
      contentEl.innerHTML = `
        <div class="panel hero">
          <h1>헤더가 맞지 않아요</h1>
          <p>필수 헤더: sectionKey, sectionTitle (현재 CSV 1행을 확인해줘)</p>
        </div>`;
      return;
    }

    // sections map
    const map = new Map(); // sectionKey -> section
    for (const r of body){
      const sectionKey = (r[iSectionKey] ?? "").toString().trim();
      if(!sectionKey) continue;

      const sectionTitle = (r[iSectionTitle] ?? "").toString().trim() || sectionKey;
      const sectionOrder = (iSectionOrder >= 0) ? normalizeNumber(r[iSectionOrder]) : 0;

      if(!map.has(sectionKey)){
        map.set(sectionKey, { sectionKey, sectionTitle, sectionOrder, items: [] });
      }

      map.get(sectionKey).items.push({
        blockType: (iBlockType >= 0 ? (r[iBlockType] ?? "").toString().trim() : ""),
        title: (iTitle >= 0 ? (r[iTitle] ?? "").toString().trim() : ""),
        body: (iBody >= 0 ? (r[iBody] ?? "").toString().trim() : ""),
        imageUrl: (iImageUrl >= 0 ? (r[iImageUrl] ?? "").toString().trim() : ""),
        orderNum: (iOrder >= 0 ? normalizeNumber(r[iOrder]) : 0),
      });
    }

    // sort sections + sort items by order
    SECTIONS = [...map.values()]
      .sort((a,b)=>a.sectionOrder - b.sectionOrder)
      .map(sec => ({
        ...sec,
        items: [...sec.items].sort((a,b)=>a.orderNum - b.orderNum)
      }));

    buildMenu();

    // default active
    if(!ACTIVE_KEY || !SECTIONS.some(s=>s.sectionKey===ACTIVE_KEY)){
      ACTIVE_KEY = SECTIONS[0]?.sectionKey ?? null;
    }
    setActive(ACTIVE_KEY);

    // reset search on refresh? (원하면 유지도 가능)
    // QUERY = "";
    // SEARCH_ALL = true;

    render();
  }

  init();
</script>
</body>
</html>
