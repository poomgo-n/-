<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>입고 가이드</title>

<style>

body{
font-family: Pretendard, Arial;
margin:0;
background:#f6f8fb;
color:#222;
}

header{
background:white;
padding:20px;
border-bottom:1px solid #eee;
font-size:22px;
font-weight:700;
}

.container{
display:flex;
max-width:1400px;
margin:auto;
}

.sidebar{
width:260px;
background:white;
padding:20px;
border-right:1px solid #eee;
height:100vh;
position:sticky;
top:0;
}

.sidebar h3{
margin-top:0;
}

.sidebar a{
display:block;
padding:8px 0;
color:#444;
text-decoration:none;
}

.sidebar a:hover{
color:#0040D1;
}

.content{
flex:1;
padding:40px;
}

.section{
margin-bottom:60px;
}

.section h2{
margin-bottom:20px;
border-bottom:2px solid #0040D1;
padding-bottom:10px;
}

.card{
background:white;
border-radius:10px;
padding:20px;
margin-bottom:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.05);
}

.card h4{
margin:0 0 10px;
}

.card img{
width:100%;
margin-top:10px;
border-radius:8px;
}

@media(max-width:900px){
.container{
flex-direction:column;
}

.sidebar{
width:100%;
height:auto;
border-right:none;
border-bottom:1px solid #eee;
}

}

</style>
</head>

<body>

<header>
입고 가이드
</header>

<div class="container">

<div class="sidebar" id="menu">
<h3>목차</h3>
</div>

<div class="content" id="content"></div>

</div>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQpBeQJu80tBSbiJyMdP9WSwOvbF-2Zk3NqmPKmoeG1hRir8GhULIpfahbdGfpkEYLKBcLt-0d6IFEf/pub?gid=0&single=true&output=csv"

async function loadGuide(){

const res = await fetch(sheetURL)
const text = await res.text()

const rows = text.split("\n").map(r=>r.split(","))

const header = rows.shift()

const sectionIndex = header.indexOf("section")
const titleIndex = header.indexOf("title")
const contentIndex = header.indexOf("content")
const imageIndex = header.indexOf("image")

const data={}

rows.forEach(r=>{

const section=r[sectionIndex]

if(!data[section]) data[section]=[]

data[section].push({
title:r[titleIndex],
content:r[contentIndex],
image:r[imageIndex]
})

})

render(data)

}

function render(data){

const menu=document.getElementById("menu")
const content=document.getElementById("content")

Object.keys(data).forEach(section=>{

const id=section.replace(/\s/g,"")

menu.innerHTML+=`<a href="#${id}">${section}</a>`

let html=`<div class="section" id="${id}">
<h2>${section}</h2>`

data[section].forEach(item=>{

html+=`
<div class="card">
<h4>${item.title}</h4>
<p>${item.content}</p>
${item.image?`<img src="${item.image}">`:""}
</div>
`

})

html+=`</div>`

content.innerHTML+=html

})

}

loadGuide()

</script>

</body>
</html>
